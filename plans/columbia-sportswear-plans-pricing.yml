description: Columbia Sportswear is a consumer outdoor-apparel retailer. There is no public developer
  API or public API pricing — wholesale, B2B EDI, and partner integrations are negotiated through Columbia's
  business channels rather than offered as a self-service developer plan.
sources:
  - https://www.columbia.com/
notes: No public API pricing or developer plan published. Any data exchange is governed by retailer/wholesale
  partner agreements.
