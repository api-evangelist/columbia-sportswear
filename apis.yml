description: >-
  Columbia Sportswear is a global designer, marketer, and distributor of
  outdoor, active, and everyday lifestyle apparel, footwear, accessories, and
  equipment under the Columbia, Mountain Hardwear, SOREL, and prAna brands.
  Columbia Sportswear Digital operates a partner-focused developer portal on
  Microsoft Azure API Management at columbia.portal.azure-api.net, exposing
  APIs for Order Management, Consumer Management, Product Lifecycle Management,
  Cognitive, Weather, and Translation. The developer portal is gated:
  registered partners create an account, browse products and APIs, request
  subscription keys, and integrate against the published endpoints. The
  company also exchanges traditional EDI documents (POs, ASNs, invoices) with
  retail trading partners through providers like TrueCommerce and eZCom.
apis:
  - aid: columbia-sportswear:digital-developer-portal
    name: Columbia Sportswear Digital Developer Portal
    tags:
      - Cognitive
      - Consumer Management
      - Order Management
      - Partner APIs
      - Product Lifecycle
      - Translation
      - Weather
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://columbia.portal.azure-api.net/
    properties:
      - url: https://columbia.portal.azure-api.net/
        type: DeveloperPortal
      - url: https://columbia-dev.portal.azure-api.net/
        type: Developer Portal (Dev)
    description: >-
      Columbia Sportswear's partner-facing API platform hosted on Microsoft
      Azure API Management. The portal organizes APIs across Order Management
      (B2B and DTC orders), Consumer Management (loyalty, profiles), Product
      Lifecycle Management (catalog, content, classification), Cognitive
      (search and recommendations), Weather, and Translation. Subscription
      keys are required and granted on a per-partner basis. The portal exposes
      try-it consoles, request examples, and documentation per API product.
    x-features:
      - Hosted on Microsoft Azure API Management
      - Subscription-key based authentication
      - Multi-product API catalog (Order, Consumer, PLM, Cognitive, Weather, Translation)
      - Self-service partner onboarding and key request
      - Try-it consoles per API operation
      - Dev and production portal environments
    x-use-cases:
      - Power retail partner order fulfillment workflows
      - Sync product catalog data with marketplaces
      - Personalize consumer experiences via consumer-management APIs
      - Drive store and fulfillment decisions with weather data
      - Enable translation and localization for global commerce
