specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Columbia Sportswear
providerId: columbia-sportswear
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Retail
  - Apparel
description: 'FOCUS-aligned FinOps for Columbia Sportswear: no public API/SaaS surface — Columbia is a
  retailer, not a platform vendor. Meters below cover wholesale/partner data exchange invoice abstractions.'
sources:
  - https://www.columbia.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Columbia Sportswear Company
serviceCategory: Retail
billingModel:
  pricingCategory: Wholesale / Purchase Order
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Columbia Sportswear
  ServiceCategory: Retail
  ProviderName: Columbia Sportswear
  PublisherName: Columbia Sportswear Company
  InvoiceIssuerName: Columbia Sportswear Company
  BillingCurrency: USD
meters:
  - name: wholesale_units
    unit: unit
    aggregation: sum
    dimensions:
      - sku
      - season
      - region
  - name: order_value
    unit: USD
    aggregation: sum
    dimensions:
      - account
      - region
principles:
  - name: Visibility
    description: Reconcile Columbia invoices and EDI 810/856 documents against purchase orders and ASNs.
  - name: Allocation
    description: Tag wholesale POs to retail location, banner, or e-commerce channel.
  - name: Optimization
    description: Right-size seasonal buys; manage markdown reserves; coordinate freight terms with Columbia
      logistics.
  - name: Accountability
    description: Merchandising owns buy quantities; finance owns AP and reconciliation.
notes: No public API/SaaS pricing; this is a retail/wholesale relationship, not an API consumption relationship.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
